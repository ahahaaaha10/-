name: mac_optimization_audit
on: [workflow_dispatch]
jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        env:
          TS_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          chmod +x build_assets_mac.sh
          ./build_assets_mac.sh
